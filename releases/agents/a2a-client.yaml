apiVersion: apps/v1
kind: Deployment
metadata:
  name: a2a-demo-client
  namespace: kagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a2a-demo-client
  template:
    metadata:
      labels:
        app: a2a-demo-client
    spec:
      containers:
        - name: agent
          image: belskiiartem/mock-agent:v0.0.2
          ports:
            - containerPort: 8000
          env:
            - name: AGENT_1_URL
              value: "http://a2a-demo-server.kagent.svc.cluster.local:8080"
            - name: PHOENIX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: phoenix-api-key
                  key: Authorization
            - name: "PHOENIX_ENDPOINT"
              value: "http://phoenix-svc.phoenix.svc.cluster.local:6006"              

---
apiVersion: v1
kind: Service
metadata:
  name: a2a-demo-client
  namespace: kagent
spec:
  selector:
    app: a2a-demo-client
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: a2a-demo-client
  namespace: kagent
spec:
  type: Declarative
  description: Client agent (calls server agent)

  declarative:
    modelConfig: default-model-config

    tools:
      - type: Agent
        agent:
          name: a2a-demo-server
          namespace: kagent                  